name: Update hate crime data

on:
  schedule:
    # Every Monday at 09:00 UTC (~4-5am ET). Adjust as needed.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}  # allows manual "Run workflow" trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests scikit-learn numpy

      - name: Fetch DC data
        run: python scripts/fetch_dc.py

      - name: Fetch Montgomery County data
        run: python scripts/fetch_mcpd.py

      - name: Build & clean merged event data
        run: python scripts/build_data.py

      - name: Run analysis (clustering, predictions, risk scores)
        run: python scripts/analyze.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/analytics.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Automated weekly data update ($(date -u +%Y-%m-%d))"
            git push
          fi
